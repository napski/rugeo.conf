[General]
loglevel = notify
ipv6 = true

[Proxy]
VPN = your_vpn_here
# можно добавить второй сервер для резерва
# VPN2 = your_backup_vpn_here


[Proxy Group]
PROXY = select,VPN
# если добавишь второй сервер:
# PROXY = select,VPN,VPN2


[Rule]

# =========================
# 1. Т-БАНК / TINKOFF — ВСЕГДА ЧЕРЕЗ VPN
# =========================
DOMAIN-SUFFIX,tbank.ru,PROXY
DOMAIN-SUFFIX,tinkoff.ru,PROXY
DOMAIN-SUFFIX,tcsbank.ru,PROXY
DOMAIN-SUFFIX,static.tbank.ru,PROXY
DOMAIN-SUFFIX,api.tinkoff.ru,PROXY


# =========================
# 2. WHITELIST РФ — DIRECT (без VPN)
# =========================
RULE-SET,https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/main/whitelist.txt,DIRECT


# =========================
# 3. РОССИЯ (IP GEO) — тоже DIRECT
# =========================
GEOIP,RU,DIRECT


# =========================
# 4. РЕКЛАМА / ТРЕКЕРЫ — БЛОК
# =========================
DOMAIN-SUFFIX,doubleclick.net,REJECT
DOMAIN-SUFFIX,googlesyndication.com,REJECT
DOMAIN-SUFFIX,adservice.google.com,REJECT
DOMAIN-SUFFIX,analytics.google.com,REJECT
DOMAIN-SUFFIX,facebook.com/tr,REJECT


# =========================
# 5. ВСЁ ОСТАЛЬНОЕ — ЧЕРЕЗ VPN
# =========================
FINAL,PROXY
